schema_version = 1

description = "Product recommendation strategy for shopping surfaces"
type = "catalog:product-recommendations"

[resolve]
default = "baseline"

[[resolve.rule]]
when = 'qualifier["eu-premium-users"]'
value = "personalized"

[[resolve.rule]]
when = 'qualifier["returning-users"]'
value = "personalized"

[[resolve.rule]]
when = 'qualifier["enterprise-accounts"]'
value = "enterprise"
