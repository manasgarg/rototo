schema_version = 1

description = "Search ranking algorithm for catalog queries"
type = "string"

[values]
classic = "classic"
semantic = "semantic"
hybrid = "hybrid"

[resolve]
default = "classic"

[[resolve.rule]]
qualifier = "env-dev"
value = "semantic"

[[resolve.rule]]
qualifier = "env-stage"
value = "hybrid"

[[resolve.rule]]
qualifier = "premium-beta-users"
value = "hybrid"
