schema_version = 1

description = "Search ranking algorithm for catalog queries"
type = "string"

[resolve]
default = "classic"

[[resolve.rule]]
when = 'variables["lane-dev"]'
value = "semantic"

[[resolve.rule]]
when = 'variables["lane-stage"]'
value = "hybrid"

[[resolve.rule]]
when = 'variables["premium-beta-users"]'
value = "hybrid"
