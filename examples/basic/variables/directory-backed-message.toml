schema_version = 1

[variable]
description = "Message loaded from per-value TOML files"
type = "string"

[variable.lint]
path = "../lint/directory-backed-message.lua"

[[variable.lint.rule]]
id = "consumer-experience/message-not-empty"
title = "Directory-backed message is empty"
help = "Set a non-empty message."

[variable.env._]
value = "control"

[variable.env.prod]
value = "control"

[[variable.env.prod.rule]]
description = "Premium users get the premium message"
qualifier = "premium-users"
value = "premium"
