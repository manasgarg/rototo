schema_version = 1

[variable]
description = "Maximum response token budget for interactive completions"
type = "int"

[variable.values]
small = 1200
standard = 2400
large = 5000

[variable.env._]
value = "standard"

[variable.env.dev]
value = "large"

[variable.env.prod]
value = "standard"

[[variable.env.prod.rule]]
description = "Enterprise accounts get a larger token budget"
qualifier = "enterprise-accounts"
value = "large"
