schema_version = 1

description = "Maximum response token budget for interactive completions"
type = "int"

[values]
small = 1200
standard = 2400
large = 5000

[env._]
value = "standard"

[env.dev]
value = "large"

[env.stage]
value = "small"

[env.prod]
value = "standard"

[[env.prod.rule]]
description = "Enterprise accounts get a larger token budget"
qualifier = "enterprise-accounts"
value = "large"
