schema_version = 1

description = "Maximum response token budget for interactive completions"
type = "int"

[resolve]
default = 2400

[[resolve.rule]]
when = 'env.qualifier["lane-stage"]'
value = 1200

[[resolve.rule]]
when = 'env.qualifier["lane-dev"]'
value = 5000

[[resolve.rule]]
when = 'env.qualifier["enterprise-accounts"]'
value = 5000
