schema_version = 1

description = "Maximum response token budget for interactive completions"
type = "int"

[resolve]
default = 2400

[[resolve.rule]]
when = 'variables["lane-stage"]'
value = 1200

[[resolve.rule]]
when = 'variables["lane-dev"]'
value = 5000

[[resolve.rule]]
when = 'variables["enterprise-accounts"]'
value = 5000
