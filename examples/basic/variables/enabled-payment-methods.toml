schema_version = 1

description = "Payment methods enabled at checkout"
type = "list"

[values]
standard = ["card", "paypal"]
mobile = ["card", "apple_pay", "google_pay"]
enterprise = ["card", "invoice", "wire_transfer"]

[resolve]
default = "standard"

[[resolve.rule]]
qualifier = "mobile-users"
value = "mobile"

[[resolve.rule]]
qualifier = "enterprise-accounts"
value = "enterprise"
