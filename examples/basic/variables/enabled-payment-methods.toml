schema_version = 1

description = "Payment methods enabled at checkout"
type = "list"

[resolve]
default = ["card", "paypal"]

[[resolve.rule]]
when = 'variables["mobile-users"]'
value = ["card", "apple_pay", "google_pay"]

[[resolve.rule]]
when = 'variables["enterprise-accounts"]'
value = ["card", "invoice", "wire_transfer"]
