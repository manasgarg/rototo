schema_version = 1

description = "Risk score threshold above which checkout asks for review"
type = "number"

[values]
relaxed = 0.92
standard = 0.82
strict = 0.70

[env._]
value = "standard"

[env.dev]
value = "relaxed"

[env.prod]
value = "standard"

[[env.prod.rule]]
description = "High-value carts use a stricter threshold"
qualifier = "high-value-cart"
value = "strict"
