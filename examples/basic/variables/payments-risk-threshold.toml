schema_version = 1

description = "Risk score threshold above which checkout asks for review"
type = "number"

[values]
relaxed = 0.92
standard = 0.82
strict = 0.70

[resolve]
default = "standard"

[[resolve.rule]]
qualifier = "env-dev"
value = "relaxed"

[[resolve.rule]]
qualifier = "high-value-cart"
value = "strict"
