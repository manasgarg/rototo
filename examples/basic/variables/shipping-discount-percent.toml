schema_version = 1

description = "Shipping discount percentage at checkout"
type = "int"

[values]
none = 0
small = 5
premium = 15
high_value = 25

[resolve]
default = "none"

[[resolve.rule]]
qualifier = "env-stage"
value = "small"

[[resolve.rule]]
qualifier = "premium-users"
value = "premium"

[[resolve.rule]]
qualifier = "high-value-cart"
value = "high_value"
