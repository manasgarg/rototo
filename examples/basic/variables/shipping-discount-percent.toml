schema_version = 1

description = "Shipping discount percentage at checkout"
type = "int"

[resolve]
default = 0

[[resolve.rule]]
when = 'env.qualifier["lane-stage"]'
value = 5

[[resolve.rule]]
when = 'env.qualifier["premium-users"]'
value = 15

[[resolve.rule]]
when = 'env.qualifier["high-value-cart"]'
value = 25
