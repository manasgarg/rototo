schema_version = 1

description = "Per-request observability policy for rototo console"
type = "catalog:console-request-observability"

[resolve]
default = "standard"

[[resolve.rule]]
when = 'env.qualifier["request-dev-console"]'
value = "dev-all"

[[resolve.rule]]
when = 'env.qualifier["request-server-error"]'
value = "retain-errors"

[[resolve.rule]]
when = 'env.qualifier["request-slow"]'
value = "retain-slow"
