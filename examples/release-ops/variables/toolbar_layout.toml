schema_version = 1
description = "Toolbar arrangement, under an A/B test"
type = "list=toolbar_layouts"

# An experiment whose values are list members, so a typo in an arm's value is a
# lint failure. `default` is what the unenrolled see: the holdback and the users
# in the rollout's buckets. Control deliberately equals default: control must BE
# the baseline or the experiment measures the wrong thing.
[resolve]
method = "allocation"
allocation = "toolbar_layout"
default = "classic"

[[resolve.assign]]
arm = "control"
value = "classic"

[[resolve.assign]]
arm = "compact"
value = "compact"
