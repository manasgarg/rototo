# UPDATE: a replacement [resolve] block, permitted by the base's update grant. It replaces the base's block atomically; there is no merge and
# no fallback into the base resolution. The base keeps the variable's identity
# and type. This query runs over the COMPOSED catalog: acme_flash_sale (Acme's
# add) is a candidate, spring_sale (deleted by Acme) is not. Acme restates the
# base pipeline and changes only the default.
[resolve]
method = "query"
from = "banners"
filter = '(!has(entry.starts) || (env.now >= entry.starts && env.now < entry.ends)) && (entry.audiences == [] || entry.audiences.exists(a, (!has(a.min_visits) || context.visitor.visits >= a.min_visits) && (!has(a.max_visits) || context.visitor.visits <= a.max_visits) && (!has(a.min_lifetime_spend) || context.visitor.lifetime_spend >= a.min_lifetime_spend)))'
sort = 'entry.priority'
order = "desc"
default = "acme_flash_sale"
