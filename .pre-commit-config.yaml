# Local pre-commit hooks for rototo. `just setup` installs pre-commit
# from requirements-dev.txt and registers both commit and push hooks.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
        exclude: >-
          (?x)^(
            tests/fixtures/packages/invalid-toml/|
            tests/fixtures/workspaces/invalid-(workspace-toml|resource-toml)/|
            tests/fixtures/workspaces/invalid-workspace-file-toml/(qualifiers|variables)/broken\.toml|
            tests/fixtures/workspaces/invalid-workspace-toml/rototo-workspace\.toml|
            tests/fixtures/workspaces/rules/parse/(qualifier-parse-failed/qualifiers|variable-parse-failed/variables)/broken\.toml|
            tests/fixtures/workspaces/rules/parse/variable-external-value-parse-failed/variables/external-message-values/broken\.toml|
            tests/fixtures/workspaces/rules/parse/workspace-manifest-parse-failed/rototo-workspace\.toml
          )
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.(bat|cmd)$'

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Check Rust formatting.
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: check
        name: just check
        description: Run the local CI-equivalent gate before push.
        entry: just check
        language: system
        pass_filenames: false
        stages: [pre-push]
