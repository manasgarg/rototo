name: Dependency Freshness

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    name: dependency freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/console-server/package-lock.json
            apps/console-web/package-lock.json
            sdks/typescript/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run dependency freshness report
        run: bash scripts/check-dependency-freshness.sh
