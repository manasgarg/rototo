name: NPM Bootstrap

on:
  workflow_dispatch:
    inputs:
      version:
        description: npm package version to publish
        required: true
        default: "0.1.0-alpha.4"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-bootstrap-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify npm package metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Verify package version
        working-directory: sdks/typescript
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e 'const pkg = require("./package.json"); if (pkg.version !== process.env.VERSION) { throw new Error(`package.json version ${pkg.version} does not match ${process.env.VERSION}`); }'
          node -e 'const lock = require("./package-lock.json"); if (lock.version !== process.env.VERSION || lock.packages[""].version !== process.env.VERSION) { throw new Error("package-lock.json version does not match requested version"); }'

  native:
    name: Build native module (${{ matrix.artifact }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: linux-arm64-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: darwin-x64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win32-x64-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install npm dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Build native module
        working-directory: sdks/typescript
        run: npm run build:native -- --target ${{ matrix.target }}

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: typescript-native-${{ matrix.artifact }}
          path: sdks/typescript/rototo.*.node
          if-no-files-found: error

  publish:
    name: Publish npm package
    needs:
      - verify
      - native
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Download native modules
        uses: actions/download-artifact@v4
        with:
          pattern: typescript-native-*
          path: sdks/typescript
          merge-multiple: true

      - name: Prepare package
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build:ts
          ls -la rototo.*.node
          npm pack --dry-run

      - name: Publish to npm
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance
