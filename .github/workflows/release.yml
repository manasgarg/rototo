name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install just
        run: cargo install just --locked

      - name: Validate release version and generated package content
        run: just release-check "${GITHUB_REF_NAME#v}"

      - name: Run release gate
        run: just check

      - name: Verify Rust package
        run: cargo publish --package rototo --dry-run --locked

  python-sdist:
    name: Build Python sdist
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          maturin-version: v1.13.3
          working-directory: sdks/python

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: sdks/python/dist/*.tar.gz
          if-no-files-found: error

  python-wheels:
    name: Build Python wheel (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64
            artifact: linux-x86_64
            manylinux: "2_28"
          - os: ubuntu-22.04
            target: aarch64
            artifact: linux-aarch64
            manylinux: "2_28"
          - os: macos-15-intel
            target: x86_64
            artifact: macos-x86_64
            manylinux: auto
          - os: macos-15
            target: aarch64
            artifact: macos-aarch64
            manylinux: auto
          - os: windows-latest
            target: x64
            artifact: windows-x64
            manylinux: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --locked --out dist --compatibility pypi
          manylinux: ${{ matrix.manylinux }}
          maturin-version: v1.13.3
          target: ${{ matrix.target }}
          working-directory: sdks/python

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.artifact }}
          path: sdks/python/dist/*.whl
          if-no-files-found: error

  typescript-native:
    name: Build TypeScript native module (${{ matrix.artifact }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: linux-arm64-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: darwin-x64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win32-x64-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Rust crate
        run: cargo publish --package rototo --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install npm dependencies
        working-directory: sdks/typescript
        run: npm ci

      - name: Build native module
        working-directory: sdks/typescript
        run: npm run build:native -- --target ${{ matrix.target }}

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: typescript-native-${{ matrix.artifact }}
          path: sdks/typescript/rototo.*.node
          if-no-files-found: error

  publish:
    name: Publish crates.io, PyPI, and npm
    needs:
      - validate
      - python-sdist
      - python-wheels
      - typescript-native
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Download TypeScript native modules
        uses: actions/download-artifact@v4
        with:
          pattern: typescript-native-*
          path: sdks/typescript
          merge-multiple: true

      - name: Prepare TypeScript SDK package
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run build:ts
          ls -la rototo.*.node
          npm pack --dry-run

      - name: Publish TypeScript SDK
        working-directory: sdks/typescript
        run: npm publish --provenance --tag alpha --access public

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: python-dist
          merge-multiple: true

      - name: List Python distributions
        run: ls -la python-dist

      - name: Publish Python SDK
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist
