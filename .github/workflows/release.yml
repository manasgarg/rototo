name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install just
        run: cargo install just --locked

      - name: Validate release version and generated package content
        run: just release-check "${GITHUB_REF_NAME#v}"

      - name: Run release gate
        run: just check

      - name: Verify Rust package
        run: cargo publish --package rototo --dry-run --locked

  python-sdist:
    name: Build Python sdist
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          maturin-version: v1.13.3
          working-directory: sdks/python

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: sdks/python/dist/*.tar.gz
          if-no-files-found: error

  python-wheels:
    name: Build Python wheel (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64
            artifact: linux-x86_64
            manylinux: "2_28"
          - os: ubuntu-22.04
            target: aarch64
            artifact: linux-aarch64
            manylinux: "2_28"
          - os: macos-15-intel
            target: x86_64
            artifact: macos-x86_64
            manylinux: auto
          - os: macos-15
            target: aarch64
            artifact: macos-aarch64
            manylinux: auto
          - os: windows-latest
            target: x64
            artifact: windows-x64
            manylinux: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --locked --out dist --compatibility pypi
          manylinux: ${{ matrix.manylinux }}
          maturin-version: v1.13.3
          target: ${{ matrix.target }}
          working-directory: sdks/python

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.artifact }}
          path: sdks/python/dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish crates.io and PyPI
    needs:
      - validate
      - python-sdist
      - python-wheels
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Rust crate
        run: cargo publish --package rototo --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: python-dist
          merge-multiple: true

      - name: List Python distributions
        run: ls -la python-dist

      - name: Publish Python SDK
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist
