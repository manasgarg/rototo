name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/console-server/package-lock.json
            apps/console-web/package-lock.json
            sdks/typescript/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install just
        run: cargo install just --locked
      - name: Run fmt check
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/ci-logs
          npm --prefix apps/console-server ci
          npm --prefix apps/console-web ci
          npm --prefix sdks/typescript ci
          just fmt-check 2>&1 | tee target/ci-logs/fmt.log
      - name: Reproduce locally
        if: failure()
        run: 'echo "Run locally: just fmt-check"'
      - name: Upload fmt logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-fmt-logs
          path: target/ci-logs

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/console-server/package-lock.json
            apps/console-web/package-lock.json
      - name: Cache cargo registry and git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install just
        run: cargo install just --locked
      - name: Run lint
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/ci-logs
          npm --prefix apps/console-server ci
          npm --prefix apps/console-web ci
          just lint 2>&1 | tee target/ci-logs/lint.log
      - name: Reproduce locally
        if: failure()
        run: 'echo "Run locally: just lint"'
      - name: Upload lint logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-lint-logs
          path: target/ci-logs

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/console-server/package-lock.json
            apps/console-web/package-lock.json
            sdks/typescript/package-lock.json
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cache cargo registry and git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install just
        run: cargo install just --locked
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/ci-logs
          npm --prefix apps/console-server ci
          npm --prefix apps/console-web ci
          just test 2>&1 | tee target/ci-logs/test.log
      - name: Reproduce locally
        if: failure()
        run: 'echo "Run locally: just test"'
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-logs
          path: target/ci-logs

  console:
    # The console ships as its own product (@rototo/console): build the web
    # bundle and stage it into the server's serving layout.
    name: console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/console-server/package-lock.json
            apps/console-web/package-lock.json
      - name: Build and stage the console web bundle
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/ci-logs
          npm --prefix apps/console-server ci
          npm --prefix apps/console-web ci
          npm --prefix apps/console-server run stage:web 2>&1 | tee target/ci-logs/console-build.log
      - name: Reproduce locally
        if: failure()
        run: 'echo "Run locally: just console-build"'
      - name: Upload console build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-console-build-logs
          path: target/ci-logs

  release-check:
    name: release-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/console-server/package-lock.json
            apps/console-web/package-lock.json
            sdks/typescript/package-lock.json
      - name: Install just
        run: cargo install just --locked
      - name: Run release check
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/ci-logs
          version="$(cargo metadata --locked --format-version=1 --no-deps | python3 -c 'import json, sys; data=json.load(sys.stdin); print(next(package["version"] for package in data["packages"] if package["name"]=="rototo"))')"
          just release-check "$version" 2>&1 | tee target/ci-logs/release-check.log
      - name: Reproduce locally
        if: failure()
        run: 'echo "Run locally: just release-check <version>"'
      - name: Upload release-check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-check-logs
          path: target/ci-logs

  check:
    name: just check
    needs:
      - fmt
      - lint
      - test
      - console
      - release-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/console-server/package-lock.json
            apps/console-web/package-lock.json
            sdks/typescript/package-lock.json
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install just
        run: cargo install just --locked
      - name: Check
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/ci-logs
          just check 2>&1 | tee target/ci-logs/check.log
      - name: Reproduce locally
        if: failure()
        run: 'echo "Run locally: just check"'
      - name: Upload check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-check-logs
          path: target/ci-logs
