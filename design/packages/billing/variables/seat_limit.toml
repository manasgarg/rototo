schema_version = 1
description = "How many seats this account's plan allows"
type = "int"

# The same select-and-project shape as plan_entitlements, projecting a scalar
# field instead of a list.
[resolve]
method = "query"
from = "plans"
filter = 'entry.tier == context.account.plan_tier'
map = 'entry.seat_limit'
