schema_version = 1
description = "The features included in this account's plan"
type = "list<catalog:features>"

# A join expressed as a query with a projection: select this tier's plan, then
# map projects its features list. Exactly one plan matches per tier (tier is a
# key on plans, lint-checked), so the projected list is the value. Application
# code checks membership: "sso" in the resolved list.
[resolve]
method = "query"
from = "plans"
filter = 'entry.tier == context.account.plan_tier'
map = 'entry.features'
