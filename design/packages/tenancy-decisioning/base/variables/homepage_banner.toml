schema_version = 1
description = "Which banner the homepage shows this visitor"
type = "catalog:banners"

# Ranked selection: keep banners inside their campaign window (if any) whose
# audiences (if any) match, order by priority, top entry wins. matches_audience()
# is the one-hop dereference built-in: it follows each audience reference and
# evaluates that entry's expression-typed condition.
[resolve]
method = "query"
from = "banners"
filter = '(!has(entry.starts) || (env.now >= entry.starts && env.now < entry.ends)) && matches_audience(entry.audiences)'
sort = 'entry.priority'
order = "desc"
default = "default_banner"
