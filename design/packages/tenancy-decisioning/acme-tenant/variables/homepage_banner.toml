# OVERRIDE: a complete replacement [resolve] block, permitted by the base's
# override grant. It replaces the base's block atomically; there is no merge and
# no fallback into the base resolution. The base keeps the variable's identity
# and type. This query runs over the COMPOSED catalog: acme_flash_sale (Acme's
# add) is a candidate, spring_sale (Acme's tombstone) is not. Acme restates the
# base pipeline and changes only the default.
[resolve]
method = "query"
from = "banners"
filter = '(!has(entry.starts) || (env.now >= entry.starts && env.now < entry.ends)) && matches_audience(entry.audiences)'
sort = 'entry.priority'
order = "desc"
default = "acme_flash_sale"
