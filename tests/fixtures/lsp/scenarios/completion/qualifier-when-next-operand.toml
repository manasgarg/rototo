# After a logical operator, the cursor is back at an operand position, so
# expression roots and functions return and the operators drop out.
package = "basic"
file = "qualifiers/premium.toml"

overlay = '''
schema_version = 1
when = "context.account.tier == 'premium' && $0"
'''

[[expect.includes]]
label = "context."
detail = "expression root"

[[expect.includes]]
label = "bucket("
detail = "expression function"

[[expect.excludes]]
label = "&&"
detail = "expression operator"
