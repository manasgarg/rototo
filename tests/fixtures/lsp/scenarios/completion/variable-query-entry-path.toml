# A query `filter` expression on a catalog-backed variable completes `entry.`
# paths from the catalog schema of the entries being filtered.
package = "basic"
file = "variables/message.toml"

overlay = '''
schema_version = 1
type = "list<catalog=message>"

[resolve]
method = "query"
from = "message"
filter = 'entry.$0'
'''

[[expect.includes]]
label = "entry.heading"
detail = "entry field"

[[expect.includes]]
label = "entry.body"
detail = "entry field"
