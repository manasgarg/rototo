# After typing the `env.` root, the useful suggestion is the member rototo
# provides: the evaluation timestamp. Context fields and expression functions
# do not belong at this position.
package = "basic"
file = "variables/premium.toml"

overlay = '''
schema_version = 1
type = "bool"

[resolve]
default = false

[[resolve.rule]]
when = "env.$0"
value = true
'''

[[expect.includes]]
label = "env.now"
detail = "env member"

[[expect.excludes]]
label = "context."
detail = "expression root"

[[expect.excludes]]
label = "bucket("
detail = "expression function"
