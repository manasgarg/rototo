# After typing the `env.` root, the useful suggestions are the members rototo
# provides: the qualifier map and the evaluation timestamp. Context fields and
# expression functions do not belong at this position.
package = "basic"
file = "qualifiers/premium.toml"

overlay = '''
schema_version = 1
when = "env.$0"
'''

[[expect.includes]]
label = 'env.qualifier["'
detail = "env member"

[[expect.includes]]
label = "env.now"
detail = "env member"

[[expect.excludes]]
label = "context."
detail = "expression root"

[[expect.excludes]]
label = "bucket("
detail = "expression function"
