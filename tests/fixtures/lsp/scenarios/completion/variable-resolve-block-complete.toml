# Once `default` is set in the resolve block, the remaining fields are the
# resolution method, the query pipeline keys, and another rule block.
package = "basic"
file = "variables/message.toml"

overlay = '''
schema_version = 1
type = "string"

[resolve]
default = "hello"
$0
'''

[expect]
exact = ["[[resolve.assign]]", "[[resolve.rule]]", "allocation", "filter", "from", "limit", "method", "order", "sort"]
