# `context.` in a rule `when` expression suggests the top-level properties
# of the package evaluation context schemas.
package = "basic"
file = "variables/premium.toml"

overlay = '''
schema_version = 1
type = "bool"

[resolve]
default = false

[[resolve.rule]]
when = "context.$0"
value = true
'''

[expect]
# Selecting a path completion replaces the `context.` already typed, instead of
# appending and producing `context.context.account`.
selecting = "context.account"
replaces = "context."

[[expect.includes]]
label = "context.account"
detail = "context field"

[[expect.includes]]
label = "context.device"
detail = "context field"
