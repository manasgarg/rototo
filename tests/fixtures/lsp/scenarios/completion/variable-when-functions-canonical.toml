# In operand position, completion offers the single canonical camelCase spelling
# of each expression function. The evaluator still accepts snake_case and
# shorthand aliases, but advertising every alias is noise, so they are excluded.
package = "basic"
file = "variables/premium.toml"

overlay = '''
schema_version = 1
type = "bool"

[resolve]
default = false

[[resolve.rule]]
when = "$0"
value = true
'''

[[expect.includes]]
label = "startsWith("
detail = "expression function"

[[expect.includes]]
label = "timeBefore("
detail = "expression function"

[[expect.excludes]]
label = "starts_with("
detail = "expression function"

[[expect.excludes]]
label = "ends_with("
detail = "expression function"

[[expect.excludes]]
label = "time_before("
detail = "expression function"

[[expect.excludes]]
label = "regex("
detail = "expression function"

[[expect.excludes]]
label = "prefix("
detail = "expression function"
