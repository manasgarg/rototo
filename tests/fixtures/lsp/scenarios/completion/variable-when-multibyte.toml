# An astral-plane character before the cursor must not shift the completion or
# its replace range. LSP positions count UTF-16 code units, so the emoji counts
# as two; the server must locate the `cont` token by code units, not bytes or
# scalars. The replace range for `context.` therefore still covers exactly `cont`.
package = "basic"
file = "variables/premium.toml"

overlay = '''
schema_version = 1
type = "bool"

[resolve]
default = false

[[resolve.rule]]
when = "context.account.tier == '😀' && cont$0"
value = true
'''

[expect]
selecting = "context."
replaces = "cont"

[[expect.includes]]
label = "context."
detail = "expression root"

[[expect.includes]]
label = "bucket("
detail = "expression function"
