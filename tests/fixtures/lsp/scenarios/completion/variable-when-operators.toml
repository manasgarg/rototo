# Once the cursor follows a complete boolean expression, the only useful next
# tokens are the composition operators. Expression roots and functions do not
# appear until an operator starts the next operand.
package = "basic"
file = "variables/premium.toml"

overlay = '''
schema_version = 1
type = "bool"

[resolve]
default = false

[[resolve.rule]]
when = "context.account.tier == 'premium' $0"
value = true
'''

[expect]
exact = ["&&", "||"]

[[expect.includes]]
label = "&&"
detail = "expression operator"
insert_text = "&& "

[[expect.includes]]
label = "||"
detail = "expression operator"
insert_text = "|| "

[[expect.excludes]]
label = "context."
detail = "expression root"

[[expect.excludes]]
label = "bucket("
detail = "expression function"
