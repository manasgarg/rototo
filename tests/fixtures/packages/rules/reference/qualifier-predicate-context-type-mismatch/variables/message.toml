schema_version = 1
description = "Configuration value for message."
type = "string"

[resolve]
default = "control"

[[resolve.rule]]
when = 'env.qualifier["boolean-in-string"]'
value = "treatment"

[[resolve.rule]]
when = 'env.qualifier["integer-eq-string"]'
value = "treatment"

[[resolve.rule]]
when = 'env.qualifier["object-bucket"]'
value = "treatment"

[[resolve.rule]]
when = 'env.qualifier["string-gt-number"]'
value = "treatment"
