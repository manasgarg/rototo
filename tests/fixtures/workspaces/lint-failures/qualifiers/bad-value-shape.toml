schema_version = 1

description = "Qualifier with predicate values that do not fit their operators"

[[predicate]]
attribute = "user.country"
op = "in"
value = "DE"

[[predicate]]
attribute = "cart.total"
op = "gte"
value = "large"

[[predicate]]
attribute = "user.tier"
op = "contains"
value = "premium"
