schema_version = 1

[qualifier]
description = "Qualifier with predicate values that do not fit their operators"

[[qualifier.predicate]]
attribute = "user.country"
op = "in"
value = "DE"

[[qualifier.predicate]]
attribute = "cart.total"
op = "gte"
value = "large"

[[qualifier.predicate]]
attribute = "user.tier"
op = "contains"
value = "premium"
