schema_version = 1

description = "Variable with failing custom Lua value lint"
type = "string"

[lint]
path = "../lint/custom-value.lua"

[[lint.rule]]
id = "fixture/custom-value-rejected"
title = "Custom value lint rejected a value"
help = "Change the fixture value or the Lua lint rule."

[values]
default = "ok"

[env._]
value = "default"
